<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romarabiya - Arabic to Latin Transliteration Compositor</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        #app {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            max-width: 620px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group-label {
            font-size: 0.85em;
            color: #666;
            font-weight: bold;
            margin-right: 4px;
        }

        .control-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.95em;
            color: #333;
            font-weight: bold;
        }

        .control-group input[type="radio"] {
            cursor: pointer;
            margin: 0;
            width: 16px;
            height: 16px;
        }

        .control-divider {
            width: 1px;
            height: 24px;
            background: #ddd;
        }

        /* Composition surface: a sequential row (or column) of blocks with
           an "add" insertion point before, between, and after every block. */
        .composition-surface {
            background: rgba(255, 255, 255, 0.12);
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 14px;
            padding: 30px;
            display: flex;
            align-items: center;
        }

        /* LTR: the first block added lands on the left, each new one to its right. */
        .composition-surface.horizontal {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: flex-start;
        }

        .composition-surface.vertical {
            flex-direction: column;
            align-items: center;
        }

        .composition-item {
            position: relative;
        }

        .composition-item .block-card {
            margin: 0;
        }

        .remove-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: none;
            background: #ff6b6b;
            color: white;
            font-size: 0.85em;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
            transition: all 0.15s ease;
            z-index: 1;
        }

        .remove-btn:hover {
            background: #ee5a52;
            transform: scale(1.15);
        }

        .insert-point {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .composition-surface.horizontal .insert-point {
            padding: 0 6px;
        }

        .composition-surface.vertical .insert-point {
            padding: 6px 0;
        }

        .add-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1.4em;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .add-btn:hover {
            background: white;
            color: #667eea;
            border-style: solid;
            transform: scale(1.1);
        }

        .add-btn.active {
            background: white;
            color: #667eea;
            border-style: solid;
        }

        /* Builder + preview: stacked by default, side by side in vertical layout
           (stacking two vertical columns underneath one another would waste width) */
        .builder-preview-layout {
            display: flex;
            flex-direction: column;
        }

        .builder-preview-layout.side-by-side {
            flex-direction: row;
            align-items: flex-start;
            gap: 24px;
        }

        .builder-preview-layout.side-by-side .composition-surface {
            flex: 1;
            min-width: 0;
        }

        .builder-preview-layout.side-by-side .preview-panel {
            flex: 1;
            min-width: 0;
            margin-top: 0;
        }

        /* Read-only preview stack: same blocks, no card/title/reset, just the shapes joined together */
        .preview-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 14px;
            padding: 20px;
            margin-top: 24px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        }

        .preview-panel h2 {
            text-align: center;
            color: #333;
            font-size: 1.05em;
            margin-bottom: 14px;
        }

        .preview-surface {
            display: flex;
        }

        .preview-surface.horizontal {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
        }

        .preview-surface.vertical {
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        /* Block card / cell styles, shared with the other pages */
        .block-card {
            background: white;
            border-radius: 10px;
            padding: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .block-title {
            text-align: center;
            font-size: 1em;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }

        .block-grid {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
        }

        .block {
            border: 3px solid #333;
            display: grid;
            gap: 0;
            background: white;
        }

        .block-side-by-side,
        .block-2x2,
        .block-2x2-3cells,
        .block-single,
        .block-top-span-3cells,
        .block-2x3-six,
        .block-2x3-five {
            width: 90px;
            height: 90px;
        }

        .block-single {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        .block-single .block-cell {
            border-right: none;
        }

        .block-top-span-3cells {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .block-top-span-3cells .block-cell:nth-child(1) {
            grid-column: 1 / 3;
            grid-row: 1;
            border-right: none;
        }

        .block-top-span-3cells .block-cell:nth-child(2) {
            grid-column: 1;
            grid-row: 2;
            border-right: 2px solid #333;
            border-bottom: none;
        }

        .block-top-span-3cells .block-cell:nth-child(3) {
            grid-column: 2;
            grid-row: 2;
            border-right: none;
        }

        .block-2x3-six {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }

        .block-2x3-six .block-cell:nth-child(1) {
            grid-column: 1;
            grid-row: 1;
            border-right: 2px solid #333;
        }

        .block-2x3-six .block-cell:nth-child(2) {
            grid-column: 2;
            grid-row: 1;
            border-right: none;
        }

        .block-2x3-six .block-cell:nth-child(3) {
            grid-column: 1;
            grid-row: 2;
            border-right: 2px solid #333;
        }

        .block-2x3-six .block-cell:nth-child(4) {
            grid-column: 2;
            grid-row: 2;
            border-right: none;
        }

        .block-2x3-six .block-cell:nth-child(5) {
            grid-column: 1;
            grid-row: 3;
            border-right: 2px solid #333;
            border-bottom: none;
        }

        .block-2x3-six .block-cell:nth-child(6) {
            grid-column: 2;
            grid-row: 3;
            border-right: none;
        }

        .block-2x3-five {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }

        .block-2x3-five .block-cell:nth-child(1) {
            grid-column: 1;
            grid-row: 1;
            border-right: 2px solid #333;
        }

        .block-2x3-five .block-cell:nth-child(2) {
            grid-column: 2;
            grid-row: 1;
            border-right: none;
        }

        .block-2x3-five .block-cell:nth-child(3) {
            grid-column: 1;
            grid-row: 2;
            border-right: 2px solid #333;
        }

        .block-2x3-five .block-cell:nth-child(4) {
            grid-column: 2;
            grid-row: 2;
            border-right: none;
        }

        .block-2x3-five .block-cell:nth-child(5) {
            grid-column: 1 / 3;
            grid-row: 3;
            border-right: none;
        }

        .block-side-by-side {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
        }

        .block-side-by-side .block-cell {
            border-bottom: none;
        }

        .block-side-by-side .block-cell:nth-child(1) {
            grid-column: 1;
            grid-row: 1;
            border-right: 2px solid #333;
        }

        .block-side-by-side .block-cell:nth-child(2) {
            grid-column: 2;
            grid-row: 1;
            border-right: none;
        }

        .block-2x2 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .block-2x2 .block-cell:nth-child(1) {
            grid-column: 1;
            grid-row: 1;
            border-right: 2px solid #333;
        }

        .block-2x2 .block-cell:nth-child(2) {
            grid-column: 2;
            grid-row: 1;
            border-right: none;
        }

        .block-2x2 .block-cell:nth-child(3) {
            grid-column: 1;
            grid-row: 2;
            border-right: 2px solid #333;
        }

        .block-2x2 .block-cell:nth-child(4) {
            grid-column: 2;
            grid-row: 2;
            border-right: none;
        }

        .block-2x2-3cells {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .block-2x2-3cells .block-cell:nth-child(1) {
            grid-column: 1;
            grid-row: 1;
            border-right: 2px solid #333;
        }

        .block-2x2-3cells .block-cell:nth-child(2) {
            grid-column: 2;
            grid-row: 1;
            border-right: none;
        }

        .block-cell {
            position: relative;
            border-right: 2px solid #333;
            border-bottom: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            padding: 4px;
            text-align: center;
        }

        .cell-input {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            cursor: text;
            border-radius: 6px;
            transition: background 0.2s ease;
            white-space: nowrap;
        }

        .cell-input:hover {
            background: rgba(102, 126, 234, 0.08);
        }

        .cell-input:focus {
            background: rgba(102, 126, 234, 0.15);
        }

        .cell-number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 9px;
            font-weight: normal;
            color: #333;
            font-family: Arial, sans-serif;
            pointer-events: none;
        }

        .block-cell:nth-child(2n) {
            border-right: none;
        }

        .block-2x2 .block-cell:nth-child(3) {
            border-bottom: none;
        }

        .block-2x2-3cells .block-cell:nth-child(3) {
            grid-column: 1 / 3;
            border-right: none;
        }

        .block-cell:last-child {
            border-bottom: none;
        }

        .reset-btn {
            width: 100%;
            padding: 6px;
            font-size: 0.8em;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 8px;
        }

        .reset-btn:hover {
            background: #ee5a52;
        }

        .refresh-btn {
            padding: 8px 16px;
            font-size: 0.9em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #5a6fd8;
        }

        /* Hides the block outlines while keeping their layout/spacing intact.
           !important is needed to win over the shape-specific border-right/
           border-bottom color rules above (e.g. .block-side-by-side .block-cell:nth-child(1)),
           which are more specific than a plain .no-borders .block-cell selector. */
        .no-borders .block,
        .no-borders .block-cell {
            border-color: transparent !important;
        }

        /* Edge-to-edge cell font sizing: no cell padding and a tight line-height,
           so the letter fills the cell instead of floating in the middle with
           breathing room around it. overflow: hidden keeps oversized glyphs
           (e.g. wide multi-character text) from bleeding past the cell border. */
        .edge-cells .block-cell {
            padding: 0;
            line-height: 1;
            overflow: hidden;
        }

        /* Keyboard shown as a floating tooltip next to the cell currently being edited */
        .keyboard-tooltip {
            position: absolute;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            /* A fixed width (not max-width/auto) is required here: an absolutely
               positioned box with only "left" set shrink-to-fits against the
               un-translated left point, not its final centered position, so
               near a viewport edge it can collapse far below this size even
               though translateX(-50%) leaves plenty of room once centered. */
            width: min(360px, 94vw);
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 4px);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        .keyboard-tooltip.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, 0);
        }

        .keyboard-tooltip::before {
            content: '';
            position: absolute;
            top: -8px;
            /* Points at the actual anchor cell, not just the tooltip's own
               center - the tooltip itself gets clamped to stay on-screen
               near viewport edges, so its center often isn't the anchor. */
            left: var(--arrow-left, 50%);
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid white;
        }

        .keyboard-tooltip-keys {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 12px;
            direction: ltr;
        }

        .keyboard-key {
            min-width: 38px;
            height: 38px;
            padding: 0 6px;
            font-size: 1.05em;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: #f9f9f9;
            color: #333;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .keyboard-key:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* Block-type picker shown as a floating tooltip near the "+" that opened it */
        .shape-picker {
            position: absolute;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            /* Fixed width, not max-width - see .keyboard-tooltip for why. */
            width: min(320px, 94vw);
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 4px);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        .shape-picker.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, 0);
        }

        .shape-picker::before {
            content: '';
            position: absolute;
            top: -8px;
            /* Points at the actual anchor "+" button, not just the tooltip's
               own center - see .keyboard-tooltip::before for why. */
            left: var(--arrow-left, 50%);
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid white;
        }

        .shape-picker-title {
            font-size: 0.85em;
            font-weight: bold;
            color: #666;
            padding: 10px 14px 0;
        }

        .shape-picker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 10px 14px 14px;
        }

        .shape-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: none;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .shape-option:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        .shape-option .block {
            width: 44px;
            height: 44px;
            pointer-events: none;
        }

        .shape-option .block-cell {
            min-height: 0;
            padding: 0;
        }

        .shape-option-label {
            font-size: 0.68em;
            color: #666;
            text-align: center;
            max-width: 80px;
        }

        .empty-hint {
            color: white;
            opacity: 0.85;
            font-size: 0.95em;
            padding: 10px;
        }

        @media (max-width: 700px) {
            body {
                padding: 16px 10px;
            }

            .header h1 {
                font-size: 1.6em;
            }

            .header p {
                font-size: 0.85em;
            }

            .controls-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                max-width: 100%;
                padding: 14px;
            }

            .control-group {
                justify-content: center;
                flex-wrap: wrap;
            }

            .control-divider {
                width: 100%;
                height: 1px;
            }

            .composition-surface {
                padding: 16px;
            }

            /* Stay side by side (not stacked) even on narrow screens - the
               whole point of this layout is avoiding two vertical columns
               stacked underneath each other. Just tighten the gap/padding
               so both panels still fit comfortably. */
            .builder-preview-layout.side-by-side {
                gap: 12px;
            }

            .builder-preview-layout.side-by-side .preview-panel {
                padding: 12px;
            }

            .shape-picker-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 420px) {
            .block-side-by-side,
            .block-2x2,
            .block-2x2-3cells,
            .block-single,
            .block-top-span-3cells,
            .block-2x3-six,
            .block-2x3-five {
                width: 72px;
                height: 72px;
            }

            .block-cell {
                font-size: 13px;
            }

            .shape-picker-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .keyboard-key {
                min-width: 34px;
                height: 34px;
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🔤 Romarabiya</h1>
            <p>Roman Arabiya — Arabic written in the Roman alphabet, block compositor</p>
        </div>

        <div class="controls-bar">
            <div class="control-group">
                <span class="control-group-label">Layout:</span>
                <label>
                    <input type="radio" v-model="orientation" value="horizontal"> Horizontal
                </label>
                <label>
                    <input type="radio" v-model="orientation" value="vertical"> Vertical
                </label>
            </div>
            <div class="control-divider"></div>
            <div class="control-group">
                <span class="control-group-label">Cell font size:</span>
                <label>
                    <input type="radio" v-model="fontSizeMode" value="default"> Default
                </label>
                <label>
                    <input type="radio" v-model="fontSizeMode" value="auto"> Auto (fit to cell)
                </label>
                <label>
                    <input type="radio" v-model="fontSizeMode" value="edge"> Edge (fill cell)
                </label>
            </div>
            <div class="control-divider"></div>
            <div class="control-group">
                <span class="control-group-label">Borders:</span>
                <label>
                    <input type="radio" v-model="showBorders" :value="true"> Show
                </label>
                <label>
                    <input type="radio" v-model="showBorders" :value="false"> Hide
                </label>
            </div>
            <div class="control-divider"></div>
            <div class="control-group">
                <span class="control-group-label">Mobile keyboard:</span>
                <label>
                    <input type="radio" v-model="disableNativeKeyboard" :value="false"> Native
                </label>
                <label>
                    <input type="radio" v-model="disableNativeKeyboard" :value="true"> Virtual only
                </label>
            </div>
            <div class="control-divider"></div>
            <div class="control-group">
                <button class="refresh-btn" type="button" title="Reload the page" @click="refreshPage">🔄 Refresh</button>
            </div>
        </div>

        <div class="builder-preview-layout" :class="{ 'side-by-side': orientation === 'vertical' }">
            <div class="composition-surface" :class="[orientation, { 'no-borders': !showBorders, 'edge-cells': fontSizeMode === 'edge' }]">
                <div class="insert-point">
                    <button class="add-btn" :class="{ active: pickerOpen && pickerInsertIndex === 0 }" type="button" @click="openPicker(0, $event)">+</button>
                </div>
                <span v-if="blocks.length === 0" class="empty-hint">Click + to add the first block</span>
                <template v-for="(b, i) in blocks" :key="b.id">
                    <div class="composition-item">
                        <button class="remove-btn" type="button" title="Delete block" @click="removeBlock(i)">✕</button>
                        <romarabiya-block
                            ref="blockRefs"
                            :title="'Block ' + (i + 1)"
                            :shape="b.shape"
                            v-model="b.values"
                            :font-size="fontSizeFor(b.shape)"
                            :disable-native-keyboard="disableNativeKeyboard"
                            @cell-focus="onCellFocus"
                        ></romarabiya-block>
                    </div>
                    <div class="insert-point">
                        <button class="add-btn" :class="{ active: pickerOpen && pickerInsertIndex === i + 1 }" type="button" @click="openPicker(i + 1, $event)">+</button>
                    </div>
                </template>
            </div>

            <div class="preview-panel" v-if="blocks.length">
                <h2>👁️ Preview</h2>
                <div class="preview-surface" :class="[orientation, { 'no-borders': !showBorders, 'edge-cells': fontSizeMode === 'edge' }]">
                    <romarabiya-block-preview
                        v-for="b in blocks"
                        :key="'preview-' + b.id"
                        :shape="b.shape"
                        :model-value="b.values"
                        :font-size="fontSizeFor(b.shape)"
                    ></romarabiya-block-preview>
                </div>
            </div>
        </div>

        <div
            ref="shapePickerEl"
            class="shape-picker"
            :class="{ visible: pickerOpen }"
            :style="{ top: pickerTop + 'px', left: pickerLeft + 'px', '--arrow-left': pickerArrowLeft + 'px' }"
        >
            <div class="shape-picker-title">Choose a block type</div>
            <div class="shape-picker-grid">
                <button
                    v-for="(info, key) in shapes"
                    :key="key"
                    class="shape-option"
                    type="button"
                    @click="choosePickerShape(key)"
                >
                    <div class="block" :class="info.cssClass">
                        <div class="block-cell" v-for="n in info.cells" :key="n"></div>
                    </div>
                    <span class="shape-option-label">{{ info.label }}</span>
                </button>
            </div>
        </div>

        <div
            ref="keyboardTooltipEl"
            class="keyboard-tooltip"
            :class="{ visible: keyboardVisible }"
            :style="{ top: keyboardTop + 'px', left: keyboardLeft + 'px', '--arrow-left': keyboardArrowLeft + 'px' }"
        >
            <div class="keyboard-tooltip-keys">
                <button
                    v-for="l in letters"
                    :key="l.ch"
                    class="keyboard-key"
                    type="button"
                    :title="l.name"
                    @mousedown.prevent="insertLetter(l.ch)"
                >{{ l.ch }}</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="block-library.js"></script>
    <script>
        const { createApp } = Vue;
        const { shapes } = ArabicBlockLibrary;

        // Latin transliteration keyboard, mapped 1:1 to the Arabic alphabet
        // (in the same order as arabicLetters in block-library.js), plus two
        // dialectal-only letters (G, V) that have no standard Arabic equivalent.
        const romanLetters = [
            { ch: 'a', name: 'Alef' },
            { ch: 'ä', name: 'Hamza' },
            { ch: 'b', name: 'Ba' },
            { ch: 't', name: 'Ta' },
            { ch: 'th', name: 'Tha' },
            { ch: 'j', name: 'Jim' },
            { ch: 'ḥ', name: 'Ha (ĥ/ḥ)' },
            { ch: 'kh', name: 'Kha' },
            { ch: 'd', name: 'Dal' },
            { ch: 'dh', name: 'Dhal' },
            { ch: 'r', name: 'Ra' },
            { ch: 'z', name: 'Za' },
            { ch: 's', name: 'Sin' },
            { ch: 'sh', name: 'Shin' },
            { ch: 'ṣ', name: 'Sad' },
            { ch: 'ḍ', name: 'Dad' },
            { ch: 'ṭ', name: 'Tah' },
            { ch: 'ḍh', name: 'Zah' },
            { ch: 'â', name: 'Ain' },
            { ch: 'gh', name: 'Ghain' },
            { ch: 'f', name: 'Fa' },
            { ch: 'q', name: 'Qaf' },
            { ch: 'k', name: 'Kaf' },
            { ch: 'l', name: 'Lam' },
            { ch: 'm', name: 'Mim' },
            { ch: 'n', name: 'Nun' },
            { ch: 'h', name: 'Ha' },
            { ch: 'w', name: 'Waw' },
            { ch: 'y', name: 'Ya' },
            { ch: 'g', name: 'Gaf (dialectal)' },
            { ch: 'v', name: 'Veh (dialectal)' },
            { ch: 'i', name: 'I (vowel)' },
            { ch: 'o', name: 'O (vowel)' },
            { ch: 'e', name: 'E (vowel)' },
            { ch: 'u', name: 'U (vowel)' }
        ];

        function placeCaretAtEnd(el) {
            const range = document.createRange();
            range.selectNodeContents(el);
            range.collapse(false);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }

        // Same shape/cell layout as SyllableBlock, but cells hold multi-character
        // Latin transliterations (Th, Kh, Sh, ...) instead of a single Arabic
        // glyph, so there is no "keep only the last character" truncation here.
        const RomarabiyaBlock = {
            props: {
                title: { type: String, default: '' },
                shape: { type: String, required: true },
                modelValue: { type: Array, required: true },
                fontSize: { type: [Number, String], default: null },
                disableNativeKeyboard: { type: Boolean, default: false }
            },
            emits: ['update:modelValue', 'cell-focus'],
            computed: {
                shapeInfo() {
                    return shapes[this.shape] || shapes['single'];
                },
                cellFontStyle() {
                    if (this.fontSize === null) return {};
                    return { fontSize: typeof this.fontSize === 'number' ? this.fontSize + 'px' : this.fontSize };
                }
            },
            mounted() {
                this.syncDom();
            },
            methods: {
                syncDom() {
                    const inputs = this.$refs.cellInputs || [];
                    inputs.forEach((el, i) => {
                        el.textContent = this.modelValue[i] || '';
                    });
                },
                onFocus(e, i) {
                    this.$emit('cell-focus', { el: e.target, title: this.title, index: i, block: this });
                },
                onInput(e, i) {
                    const text = e.target.textContent || '';
                    const updated = this.modelValue.slice();
                    updated[i] = text;
                    this.$emit('update:modelValue', updated);
                },
                onKeydown(e, i) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        this.focusCell(i + 1);
                    } else if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        this.focusCell(i + 1);
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        this.focusCell(i - 1);
                    }
                },
                focusCell(i) {
                    const inputs = this.$refs.cellInputs || [];
                    const el = inputs[i];
                    if (el) {
                        el.focus();
                        placeCaretAtEnd(el);
                    }
                },
                reset() {
                    const cleared = this.modelValue.map(() => '');
                    this.$emit('update:modelValue', cleared);
                    this.$nextTick(() => this.syncDom());
                }
            },
            template: `
                <div class="block-card">
                    <div class="block-title">{{ title }}</div>
                    <div class="block-grid">
                        <div class="block" :class="shapeInfo.cssClass">
                            <div
                                v-for="(v, i) in modelValue"
                                :key="i"
                                class="block-cell"
                            >
                                <span class="cell-number">{{ i + 1 }}</span>
                                <div
                                    class="cell-input"
                                    :contenteditable="disableNativeKeyboard ? 'false' : 'true'"
                                    :inputmode="disableNativeKeyboard ? 'none' : null"
                                    tabindex="0"
                                    spellcheck="false"
                                    ref="cellInputs"
                                    :style="cellFontStyle"
                                    @focus="onFocus($event, i)"
                                    @input="onInput($event, i)"
                                    @keydown="onKeydown($event, i)"
                                ></div>
                            </div>
                        </div>
                    </div>
                    <button class="reset-btn" @click="reset">Reset</button>
                </div>
            `
        };

        const RomarabiyaBlockPreview = {
            props: {
                shape: { type: String, required: true },
                modelValue: { type: Array, required: true },
                fontSize: { type: [Number, String], default: null }
            },
            computed: {
                shapeInfo() {
                    return shapes[this.shape] || shapes['single'];
                },
                cellFontStyle() {
                    if (this.fontSize === null) return {};
                    return { fontSize: typeof this.fontSize === 'number' ? this.fontSize + 'px' : this.fontSize };
                }
            },
            template: `
                <div class="block" :class="shapeInfo.cssClass">
                    <div
                        v-for="(v, i) in modelValue"
                        :key="i"
                        class="block-cell"
                        :style="cellFontStyle"
                    >{{ v }}</div>
                </div>
            `
        };

        // Max font size a single-cell block can take. Blocks that split their
        // cell area in two (2/3/4-cell shapes) or three (5/6-cell shapes) get a
        // proportionally smaller size so the letters keep fitting their cell.
        const MAX_CELL_FONT_SIZE = 40;

        // "Edge" mode sizes text off the raw cell dimension, but a glyph's full
        // em-box (ascent + descent) is taller than its font-size at ratio 1:1 -
        // letters with descenders get clipped by overflow: hidden otherwise.
        // Scaling down leaves enough headroom for the whole glyph to stay
        // inside the cell while still reading as "filling" it.
        const EDGE_FONT_SCALE = 0.72;

        const app = createApp({
            components: {
                'romarabiya-block': RomarabiyaBlock,
                'romarabiya-block-preview': RomarabiyaBlockPreview
            },
            data() {
                return {
                    orientation: 'horizontal',
                    fontSizeMode: 'edge',
                    showBorders: true,
                    disableNativeKeyboard: true,
                    letters: romanLetters,
                    shapes: shapes,
                    blocks: [],
                    nextId: 1,

                    pickerOpen: false,
                    pickerInsertIndex: null,
                    pickerTop: 0,
                    pickerLeft: 0,
                    pickerArrowLeft: 0,

                    keyboardVisible: false,
                    keyboardTop: 0,
                    keyboardLeft: 0,
                    keyboardArrowLeft: 0,
                    activeEl: null,
                    activeBlock: null,
                    activeIndex: null,
                    pickerAnchorEl: null,

                    viewportWidth: window.innerWidth
                };
            },
            mounted() {
                document.addEventListener('mousedown', this.handleDocumentMouseDown, true);
                window.addEventListener('scroll', this.repositionFloatingPanels, true);
                window.addEventListener('resize', this.handleWindowResize);
                // Catches size changes the tooltips cause themselves (e.g. their own
                // grid/label text reflowing right after first paint) that a window
                // resize event would never fire for.
                if (window.ResizeObserver) {
                    this.floatingPanelsObserver = new ResizeObserver(() => this.repositionFloatingPanels());
                    if (this.$refs.shapePickerEl) this.floatingPanelsObserver.observe(this.$refs.shapePickerEl);
                    if (this.$refs.keyboardTooltipEl) this.floatingPanelsObserver.observe(this.$refs.keyboardTooltipEl);
                }
            },
            methods: {
                refreshPage() {
                    window.location.reload();
                },
                handleWindowResize() {
                    this.viewportWidth = window.innerWidth;
                    this.repositionFloatingPanels();
                },
                repositionFloatingPanels() {
                    this.repositionKeyboard();
                    this.repositionPicker();
                },
                // Mirrors the block-size breakpoints in CSS so "Auto" cell font sizing
                // shrinks along with the blocks themselves on narrow screens.
                maxCellFontSize() {
                    if (this.viewportWidth <= 420) return MAX_CELL_FONT_SIZE * 0.75;
                    if (this.viewportWidth <= 700) return MAX_CELL_FONT_SIZE * 0.875;
                    return MAX_CELL_FONT_SIZE;
                },
                // The actual pixel size of a block (matches .block-side-by-side etc.
                // in CSS), used by "Edge" mode to size text off the real cell
                // dimensions instead of the smaller, padding-aware "Auto" max size.
                blockPixelSize() {
                    return this.viewportWidth <= 420 ? 72 : 90;
                },
                // How many equal slices a shape's cell area is split into, so a
                // font size can be scaled down from a whole-block size to a
                // single-cell size (2/3/4-cell shapes split it in two, 5/6-cell
                // shapes split it in three).
                cellDivisor(cells) {
                    if (cells === 1) return 1;
                    if (cells === 5 || cells === 6) return 3;
                    return 2;
                },
                fontSizeFor(shapeKey) {
                    const cells = (this.shapes[shapeKey] || this.shapes['single']).cells;
                    if (this.fontSizeMode === 'edge') {
                        return (this.blockPixelSize() / this.cellDivisor(cells)) * EDGE_FONT_SCALE;
                    }
                    if (this.fontSizeMode !== 'auto') return null;
                    return this.maxCellFontSize() / this.cellDivisor(cells);
                },
                clampHorizontal(rawLeft, halfWidth) {
                    const margin = 8;
                    // If the tooltip is wider than the viewport has room for, there's no
                    // valid clamp range left (min would exceed max) - just center it.
                    if (halfWidth * 2 + margin * 2 > window.innerWidth) {
                        return window.scrollX + window.innerWidth / 2;
                    }
                    const min = window.scrollX + halfWidth + margin;
                    const max = window.scrollX + window.innerWidth - halfWidth - margin;
                    return Math.min(Math.max(rawLeft, min), max);
                },
                // The tooltip's own left/top only center it over its anchor when
                // there's room; near a viewport edge clampHorizontal shifts it so
                // the box stays on-screen. The arrow must counter-shift by the same
                // amount (clamped within the box) so it still points at the anchor.
                arrowOffset(rawCenter, clampedCenter, halfWidth) {
                    const arrowMargin = 14;
                    const width = halfWidth * 2;
                    if (width <= arrowMargin * 2) return width / 2;
                    const offset = rawCenter - clampedCenter + halfWidth;
                    return Math.min(Math.max(offset, arrowMargin), width - arrowMargin);
                },
                openPicker(index, event) {
                    this.pickerAnchorEl = event.currentTarget;
                    this.pickerInsertIndex = index;
                    this.pickerOpen = true;
                    this.keyboardVisible = false;
                    // Computed synchronously (not via $nextTick) so the picker's first
                    // paint already has the right position - the tooltip element is
                    // always in the DOM (only its opacity/visible class toggles), so
                    // its width is measurable immediately without waiting a tick.
                    this.repositionPicker();
                },
                repositionPicker() {
                    if (!this.pickerAnchorEl || !this.pickerOpen) return;
                    const rect = this.pickerAnchorEl.getBoundingClientRect();
                    this.pickerTop = rect.bottom + window.scrollY + 8;
                    // Measure the actual rendered tooltip width (it already reflects the
                    // current viewport's max-width/column-count CSS) instead of guessing.
                    const el = this.$refs.shapePickerEl;
                    const halfWidth = (el && el.offsetWidth ? el.offsetWidth : 260) / 2;
                    const rawCenter = rect.left + window.scrollX + rect.width / 2;
                    this.pickerLeft = this.clampHorizontal(rawCenter, halfWidth);
                    this.pickerArrowLeft = this.arrowOffset(rawCenter, this.pickerLeft, halfWidth);
                },
                choosePickerShape(shapeKey) {
                    if (this.pickerInsertIndex === null) return;
                    const info = this.shapes[shapeKey];
                    const block = {
                        id: this.nextId++,
                        shape: shapeKey,
                        values: Array(info.cells).fill('')
                    };
                    const insertIndex = this.pickerInsertIndex;
                    this.blocks.splice(insertIndex, 0, block);
                    this.pickerOpen = false;
                    this.pickerInsertIndex = null;
                    this.$nextTick(() => {
                        const newBlock = this.$refs.blockRefs && this.$refs.blockRefs[insertIndex];
                        if (newBlock) newBlock.focusCell(0);
                    });
                },
                removeBlock(index) {
                    this.blocks.splice(index, 1);
                    this.keyboardVisible = false;
                    this.activeEl = null;
                    this.activeBlock = null;
                    this.activeIndex = null;
                },
                onCellFocus({ el, index, block }) {
                    this.activeEl = el;
                    this.activeBlock = block;
                    this.activeIndex = index;
                    this.keyboardVisible = true;
                    this.pickerOpen = false;
                    this.repositionKeyboard();
                },
                repositionKeyboard() {
                    if (!this.activeEl || !this.keyboardVisible) return;
                    const rect = this.activeEl.getBoundingClientRect();
                    this.keyboardTop = rect.bottom + window.scrollY + 8;
                    const el = this.$refs.keyboardTooltipEl;
                    const halfWidth = (el && el.offsetWidth ? el.offsetWidth : 320) / 2;
                    const rawCenter = rect.left + window.scrollX + rect.width / 2;
                    this.keyboardLeft = this.clampHorizontal(rawCenter, halfWidth);
                    this.keyboardArrowLeft = this.arrowOffset(rawCenter, this.keyboardLeft, halfWidth);
                },
                handleDocumentMouseDown(e) {
                    const insideKeyboard = e.target.closest('.keyboard-tooltip');
                    const isCellInput = e.target.classList && e.target.classList.contains('cell-input');
                    if (!insideKeyboard && !isCellInput) {
                        this.keyboardVisible = false;
                    }

                    const insidePicker = e.target.closest('.shape-picker');
                    const isAddBtn = e.target.closest('.add-btn');
                    if (!insidePicker && !isAddBtn) {
                        this.pickerOpen = false;
                    }
                },
                insertLetter(letter) {
                    if (!this.activeEl) return;
                    this.activeEl.textContent = letter;
                    this.activeEl.dispatchEvent(new Event('input', { bubbles: true }));
                    if (this.activeBlock && this.activeIndex !== null) {
                        // Advance to the next cell in the same block, same as pressing
                        // Enter/ArrowRight after typing a letter manually.
                        this.activeBlock.focusCell(this.activeIndex + 1);
                    } else {
                        this.activeEl.focus();
                        placeCaretAtEnd(this.activeEl);
                    }
                }
            }
        });

        app.mount('#app');
    </script>
</body>
</html>
