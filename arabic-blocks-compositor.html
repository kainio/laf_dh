<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Blocks Compositor - محاكاة الكتابة العربية</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'lafd';
            src: URL('NotoKufiArabic-Regular.ttf');
        }

        @font-face {
            font-family: 'lafd2';
            src: URL('NotoKufiArabic-Regular2.ttf');
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        #app {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            max-width: 620px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group-label {
            font-size: 0.85em;
            color: #666;
            font-weight: bold;
            margin-right: 4px;
        }

        .control-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.95em;
            color: #333;
            font-weight: bold;
        }

        .control-group input[type="radio"] {
            cursor: pointer;
            margin: 0;
            width: 16px;
            height: 16px;
        }

        .control-divider {
            width: 1px;
            height: 24px;
            background: #ddd;
        }

        /* Composition surface: a sequential row (or column) of blocks with
           an "add" insertion point before, between, and after every block. */
        .composition-surface {
            background: rgba(255, 255, 255, 0.12);
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 14px;
            padding: 30px;
            display: flex;
            align-items: center;
        }

        /* RTL: the first block added lands on the right, each new one to its left.
           With row-reverse the main-axis start is the right edge, so flex-start
           packs blocks against the right instead of leaving them stranded on the left. */
        .composition-surface.horizontal {
            flex-direction: row-reverse;
            flex-wrap: wrap;
            justify-content: flex-start;
        }

        .composition-surface.vertical {
            flex-direction: column;
            align-items: center;
        }

        .composition-item {
            position: relative;
        }

        .composition-item .block-card {
            margin: 0;
        }

        .remove-btn {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: none;
            background: #ff6b6b;
            color: white;
            font-size: 0.85em;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
            transition: all 0.15s ease;
            z-index: 1;
        }

        .remove-btn:hover {
            background: #ee5a52;
            transform: scale(1.15);
        }

        .insert-point {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .composition-surface.horizontal .insert-point {
            padding: 0 6px;
        }

        .composition-surface.vertical .insert-point {
            padding: 6px 0;
        }

        .add-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1.4em;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .add-btn:hover {
            background: white;
            color: #667eea;
            border-style: solid;
            transform: scale(1.1);
        }

        .add-btn.active {
            background: white;
            color: #667eea;
            border-style: solid;
        }

        /* Builder + preview: stacked by default, side by side in vertical layout
           (stacking two vertical columns underneath one another would waste width) */
        .builder-preview-layout {
            display: flex;
            flex-direction: column;
        }

        .builder-preview-layout.side-by-side {
            flex-direction: row;
            align-items: flex-start;
            gap: 24px;
        }

        .builder-preview-layout.side-by-side .composition-surface {
            flex: 1;
            min-width: 0;
        }

        .builder-preview-layout.side-by-side .preview-panel {
            flex: 1;
            min-width: 0;
            margin-top: 0;
        }

        /* Read-only preview stack: same blocks, no card/title/reset, just the shapes joined together */
        .preview-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 14px;
            padding: 20px;
            margin-top: 24px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        }

        .preview-panel h2 {
            text-align: center;
            color: #333;
            font-size: 1.05em;
            margin-bottom: 14px;
        }

        .preview-surface {
            display: flex;
        }

        .preview-surface.horizontal {
            flex-direction: row-reverse;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
        }

        .preview-surface.vertical {
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        /* Block card / cell styles, shared with the other pages */
        .block-card {
            background: white;
            border-radius: 10px;
            padding: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .block-title {
            text-align: center;
            font-size: 1em;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }

        .block-grid {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
        }

        .block {
            border: 3px solid #333;
            display: grid;
            gap: 0;
            background: white;
        }

        .block-side-by-side,
        .block-2x2,
        .block-2x2-3cells,
        .block-single,
        .block-top-span-3cells,
        .block-2x3-six,
        .block-2x3-five {
            width: 90px;
            height: 90px;
        }

        .block-single {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        .block-single .block-cell {
            border-right: none;
        }

        .block-top-span-3cells {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .block-top-span-3cells .block-cell:nth-child(1) {
            grid-column: 1 / 3;
            grid-row: 1;
            border-right: none;
        }

        .block-top-span-3cells .block-cell:nth-child(2) {
            grid-column: 2;
            grid-row: 2;
            border-right: none;
            border-bottom: none;
        }

        .block-top-span-3cells .block-cell:nth-child(3) {
            grid-column: 1;
            grid-row: 2;
            border-right: 2px solid #333;
        }

        .block-2x3-six {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }

        .block-2x3-six .block-cell:nth-child(1) {
            grid-column: 2;
            grid-row: 1;
            border-right: none;
        }

        .block-2x3-six .block-cell:nth-child(2) {
            grid-column: 1;
            grid-row: 1;
            border-right: 2px solid #333;
        }

        .block-2x3-six .block-cell:nth-child(3) {
            grid-column: 2;
            grid-row: 2;
            border-right: none;
        }

        .block-2x3-six .block-cell:nth-child(4) {
            grid-column: 1;
            grid-row: 2;
            border-right: 2px solid #333;
        }

        .block-2x3-six .block-cell:nth-child(5) {
            grid-column: 2;
            grid-row: 3;
            border-right: none;
            border-bottom: none;
        }

        .block-2x3-six .block-cell:nth-child(6) {
            grid-column: 1;
            grid-row: 3;
            border-right: 2px solid #333;
        }

        .block-2x3-five {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }

        .block-2x3-five .block-cell:nth-child(1) {
            grid-column: 2;
            grid-row: 1;
            border-right: none;
        }

        .block-2x3-five .block-cell:nth-child(2) {
            grid-column: 1;
            grid-row: 1;
            border-right: 2px solid #333;
        }

        .block-2x3-five .block-cell:nth-child(3) {
            grid-column: 2;
            grid-row: 2;
            border-right: none;
        }

        .block-2x3-five .block-cell:nth-child(4) {
            grid-column: 1;
            grid-row: 2;
            border-right: 2px solid #333;
        }

        .block-2x3-five .block-cell:nth-child(5) {
            grid-column: 1 / 3;
            grid-row: 3;
            border-right: none;
        }

        .block-side-by-side {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
        }

        .block-side-by-side .block-cell {
            border-bottom: none;
        }

        .block-side-by-side .block-cell:nth-child(1) {
            grid-column: 2;
            grid-row: 1;
            border-right: none;
        }

        .block-side-by-side .block-cell:nth-child(2) {
            grid-column: 1;
            grid-row: 1;
            border-right: 2px solid #333;
        }

        .block-2x2 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .block-2x2 .block-cell:nth-child(1) {
            grid-column: 2;
            grid-row: 1;
            border-right: none;
        }

        .block-2x2 .block-cell:nth-child(2) {
            grid-column: 1;
            grid-row: 1;
            border-right: 2px solid #333;
        }

        .block-2x2 .block-cell:nth-child(3) {
            grid-column: 2;
            grid-row: 2;
            border-right: none;
        }

        .block-2x2 .block-cell:nth-child(4) {
            grid-column: 1;
            grid-row: 2;
            border-right: 2px solid #333;
        }

        .block-2x2-3cells {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .block-2x2-3cells .block-cell:nth-child(1) {
            grid-column: 2;
            grid-row: 1;
            border-right: none;
        }

        .block-2x2-3cells .block-cell:nth-child(2) {
            grid-column: 1;
            grid-row: 1;
            border-right: 2px solid #333;
        }

        .block-cell {
            position: relative;
            border-right: 2px solid #333;
            border-bottom: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            padding: 4px;
            text-align: center;
        }

        .cell-input {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            cursor: text;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .cell-input:hover {
            background: rgba(102, 126, 234, 0.08);
        }

        .cell-input:focus {
            background: rgba(102, 126, 234, 0.15);
        }

        .cell-number {
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 9px;
            font-weight: normal;
            color: #333;
            font-family: Arial, sans-serif;
            pointer-events: none;
        }

        .block-cell:nth-child(2n) {
            border-right: none;
        }

        .block-2x2 .block-cell:nth-child(3) {
            border-bottom: none;
        }

        .block-2x2-3cells .block-cell:nth-child(3) {
            grid-column: 1 / 3;
            border-right: none;
        }

        .block-cell:last-child {
            border-bottom: none;
        }

        .block-cell.font-lafd,
        .block-cell.font-lafd .cell-input {
            font-family: 'lafd';
        }

        .block-cell.font-lafd2,
        .block-cell.font-lafd2 .cell-input {
            font-family: 'lafd2';
        }

        .reset-btn {
            width: 100%;
            padding: 6px;
            font-size: 0.8em;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 8px;
        }

        .reset-btn:hover {
            background: #ee5a52;
        }

        /* Keyboard shown as a floating tooltip next to the cell currently being edited */
        .keyboard-tooltip {
            position: absolute;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            max-width: 340px;
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 4px);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        .keyboard-tooltip.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, 0);
        }

        .keyboard-tooltip::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid white;
        }

        .keyboard-tooltip-keys {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 12px;
            direction: rtl;
        }

        .keyboard-key {
            min-width: 38px;
            height: 38px;
            font-size: 1.2em;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: #f9f9f9;
            color: #333;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .keyboard-key.font-lafd {
            font-family: 'lafd';
        }

        .keyboard-key.font-lafd2 {
            font-family: 'lafd2';
        }

        .keyboard-key:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .keyboard-key.sukun {
            color: #ff6b6b;
        }

        .keyboard-key.sukun:hover {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }

        /* Block-type picker shown as a floating tooltip near the "+" that opened it */
        .shape-picker {
            position: absolute;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 4px);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        .shape-picker.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, 0);
        }

        .shape-picker::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid white;
        }

        .shape-picker-title {
            font-size: 0.85em;
            font-weight: bold;
            color: #666;
            padding: 10px 14px 0;
        }

        .shape-picker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 10px 14px 14px;
        }

        .shape-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: none;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .shape-option:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        .shape-option .block {
            width: 44px;
            height: 44px;
            pointer-events: none;
        }

        .shape-option .block-cell {
            min-height: 0;
            padding: 0;
        }

        .shape-option-label {
            font-size: 0.68em;
            color: #666;
            text-align: center;
            max-width: 80px;
        }

        .empty-hint {
            color: white;
            opacity: 0.85;
            font-size: 0.95em;
            padding: 10px;
        }

        @media (max-width: 700px) {
            body {
                padding: 16px 10px;
            }

            .header h1 {
                font-size: 1.6em;
            }

            .header p {
                font-size: 0.85em;
            }

            .controls-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                max-width: 100%;
                padding: 14px;
            }

            .control-group {
                justify-content: center;
                flex-wrap: wrap;
            }

            .control-divider {
                width: 100%;
                height: 1px;
            }

            .composition-surface {
                padding: 16px;
            }

            .builder-preview-layout.side-by-side {
                flex-direction: column;
                gap: 16px;
            }

            .builder-preview-layout.side-by-side .preview-panel {
                margin-top: 0;
            }

            .shape-picker,
            .keyboard-tooltip {
                max-width: min(300px, 92vw);
            }

            .shape-picker-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 420px) {
            .block-side-by-side,
            .block-2x2,
            .block-2x2-3cells,
            .block-single,
            .block-top-span-3cells,
            .block-2x3-six,
            .block-2x3-five {
                width: 72px;
                height: 72px;
            }

            .block-cell {
                font-size: 15px;
            }

            .shape-picker-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .keyboard-key {
                min-width: 34px;
                height: 34px;
                font-size: 1.05em;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🧩 Arabic Blocks Compositor</h1>
            <p>تركيب الكتل بشكل أفقي أو عمودي (Composition séquentielle de blocs)</p>
        </div>

        <div class="controls-bar">
            <div class="control-group">
                <span class="control-group-label">Font:</span>
                <label>
                    <input type="radio" v-model="font" value="lafd"> Font 1
                </label>
                <label>
                    <input type="radio" v-model="font" value="lafd2"> Font 2
                </label>
            </div>
            <div class="control-divider"></div>
            <div class="control-group">
                <span class="control-group-label">Layout:</span>
                <label>
                    <input type="radio" v-model="orientation" value="horizontal"> Horizontal
                </label>
                <label>
                    <input type="radio" v-model="orientation" value="vertical"> Vertical
                </label>
            </div>
            <div class="control-divider"></div>
            <div class="control-group">
                <span class="control-group-label">Cell font size:</span>
                <label>
                    <input type="radio" v-model="fontSizeMode" value="default"> Default
                </label>
                <label>
                    <input type="radio" v-model="fontSizeMode" value="auto"> Auto (fit to cell)
                </label>
            </div>
        </div>

        <div class="builder-preview-layout" :class="{ 'side-by-side': orientation === 'vertical' }">
            <div class="composition-surface" :class="orientation">
                <div class="insert-point">
                    <button class="add-btn" :class="{ active: pickerOpen && pickerInsertIndex === 0 }" type="button" @click="openPicker(0, $event)">+</button>
                </div>
                <span v-if="blocks.length === 0" class="empty-hint">Click + to add the first block</span>
                <template v-for="(b, i) in blocks" :key="b.id">
                    <div class="composition-item">
                        <button class="remove-btn" type="button" title="Delete block" @click="removeBlock(i)">✕</button>
                        <syllable-block
                            ref="blockRefs"
                            :title="'Block ' + (i + 1)"
                            :shape="b.shape"
                            v-model="b.values"
                            :font="font"
                            :font-size="fontSizeFor(b.shape)"
                            @cell-focus="onCellFocus"
                        ></syllable-block>
                    </div>
                    <div class="insert-point">
                        <button class="add-btn" :class="{ active: pickerOpen && pickerInsertIndex === i + 1 }" type="button" @click="openPicker(i + 1, $event)">+</button>
                    </div>
                </template>
            </div>

            <div class="preview-panel" v-if="blocks.length">
                <h2>👁️ Preview</h2>
                <div class="preview-surface" :class="orientation">
                    <syllable-block-preview
                        v-for="b in blocks"
                        :key="'preview-' + b.id"
                        :shape="b.shape"
                        :model-value="b.values"
                        :font="font"
                        :font-size="fontSizeFor(b.shape)"
                    ></syllable-block-preview>
                </div>
            </div>
        </div>

        <div
            class="shape-picker"
            :class="{ visible: pickerOpen }"
            :style="{ top: pickerTop + 'px', left: pickerLeft + 'px' }"
        >
            <div class="shape-picker-title">Choose a block type</div>
            <div class="shape-picker-grid">
                <button
                    v-for="(info, key) in shapes"
                    :key="key"
                    class="shape-option"
                    type="button"
                    @click="choosePickerShape(key)"
                >
                    <div class="block" :class="info.cssClass">
                        <div class="block-cell" v-for="n in info.cells" :key="n"></div>
                    </div>
                    <span class="shape-option-label">{{ info.label }}</span>
                </button>
            </div>
        </div>

        <div
            class="keyboard-tooltip"
            :class="{ visible: keyboardVisible }"
            :style="{ top: keyboardTop + 'px', left: keyboardLeft + 'px' }"
        >
            <div class="keyboard-tooltip-keys">
                <button
                    v-for="l in letters"
                    :key="l.ch"
                    class="keyboard-key"
                    :class="['font-' + font, { sukun: l.ch === 'ْ' }]"
                    type="button"
                    @mousedown.prevent="insertLetter(l.ch)"
                >{{ l.ch }}</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="block-library.js"></script>
    <script>
        const { createApp } = Vue;
        const { shapes, arabicLetters, SyllableBlock, SyllableBlockPreview } = ArabicBlockLibrary;

        // Max font size a single-cell block can take. Blocks that split their
        // cell area in two (2/3/4-cell shapes) or three (5/6-cell shapes) get a
        // proportionally smaller size so the letters keep fitting their cell.
        const MAX_CELL_FONT_SIZE = 48;

        const app = createApp({
            components: {
                'syllable-block': SyllableBlock,
                'syllable-block-preview': SyllableBlockPreview
            },
            data() {
                return {
                    font: 'lafd',
                    orientation: 'horizontal',
                    fontSizeMode: 'default',
                    letters: arabicLetters,
                    shapes: shapes,
                    blocks: [],
                    nextId: 1,

                    pickerOpen: false,
                    pickerInsertIndex: null,
                    pickerTop: 0,
                    pickerLeft: 0,

                    keyboardVisible: false,
                    keyboardTop: 0,
                    keyboardLeft: 0,
                    activeEl: null,

                    viewportWidth: window.innerWidth
                };
            },
            mounted() {
                document.addEventListener('mousedown', this.handleDocumentMouseDown, true);
                window.addEventListener('scroll', this.repositionKeyboard, true);
                window.addEventListener('resize', this.handleWindowResize);
            },
            methods: {
                handleWindowResize() {
                    this.viewportWidth = window.innerWidth;
                    this.repositionKeyboard();
                },
                // Mirrors the block-size breakpoints in CSS so "Auto" cell font sizing
                // shrinks along with the blocks themselves on narrow screens.
                maxCellFontSize() {
                    if (this.viewportWidth <= 420) return MAX_CELL_FONT_SIZE * 0.75;
                    if (this.viewportWidth <= 700) return MAX_CELL_FONT_SIZE * 0.875;
                    return MAX_CELL_FONT_SIZE;
                },
                fontSizeFor(shapeKey) {
                    if (this.fontSizeMode !== 'auto') return null;
                    const cells = (this.shapes[shapeKey] || this.shapes['single']).cells;
                    const max = this.maxCellFontSize();
                    if (cells === 1) return max;
                    if (cells === 5 || cells === 6) return max / 3;
                    return max / 2;
                },
                clampHorizontal(rawLeft, halfWidth) {
                    const margin = 8;
                    const min = window.scrollX + halfWidth + margin;
                    const max = window.scrollX + window.innerWidth - halfWidth - margin;
                    return Math.min(Math.max(rawLeft, min), max);
                },
                openPicker(index, event) {
                    const rect = event.currentTarget.getBoundingClientRect();
                    this.pickerInsertIndex = index;
                    this.pickerTop = rect.bottom + window.scrollY + 8;
                    this.pickerLeft = this.clampHorizontal(rect.left + window.scrollX + rect.width / 2, 150);
                    this.pickerOpen = true;
                    this.keyboardVisible = false;
                },
                choosePickerShape(shapeKey) {
                    if (this.pickerInsertIndex === null) return;
                    const info = this.shapes[shapeKey];
                    const block = {
                        id: this.nextId++,
                        shape: shapeKey,
                        values: Array(info.cells).fill('')
                    };
                    const insertIndex = this.pickerInsertIndex;
                    this.blocks.splice(insertIndex, 0, block);
                    this.pickerOpen = false;
                    this.pickerInsertIndex = null;
                    this.$nextTick(() => {
                        const newBlock = this.$refs.blockRefs && this.$refs.blockRefs[insertIndex];
                        if (newBlock) newBlock.focusCell(0);
                    });
                },
                removeBlock(index) {
                    this.blocks.splice(index, 1);
                    this.keyboardVisible = false;
                    this.activeEl = null;
                },
                onCellFocus({ el }) {
                    this.activeEl = el;
                    this.keyboardVisible = true;
                    this.pickerOpen = false;
                    this.repositionKeyboard();
                },
                repositionKeyboard() {
                    if (!this.activeEl || !this.keyboardVisible) return;
                    const rect = this.activeEl.getBoundingClientRect();
                    this.keyboardTop = rect.bottom + window.scrollY + 8;
                    this.keyboardLeft = this.clampHorizontal(rect.left + window.scrollX + rect.width / 2, 170);
                },
                handleDocumentMouseDown(e) {
                    const insideKeyboard = e.target.closest('.keyboard-tooltip');
                    const isCellInput = e.target.classList && e.target.classList.contains('cell-input');
                    if (!insideKeyboard && !isCellInput) {
                        this.keyboardVisible = false;
                    }

                    const insidePicker = e.target.closest('.shape-picker');
                    const isAddBtn = e.target.closest('.add-btn');
                    if (!insidePicker && !isAddBtn) {
                        this.pickerOpen = false;
                    }
                },
                insertLetter(letter) {
                    if (!this.activeEl) return;
                    this.activeEl.textContent = letter;
                    this.activeEl.dispatchEvent(new Event('input', { bubbles: true }));
                    this.activeEl.focus();
                }
            }
        });

        app.mount('#app');
    </script>
</body>
</html>
